name: main-pipeline
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      deploy_to:
        description: Target environment — required for main branch only
        required: false
        type: choice
        default: dev
        options: [dev, uat, prod]
      version:
        description: Commit SHA — required for UAT/PROD
        required: false
        type: string
        default: ''
      jira_key:
        description: Jira issue key — required for PROD
        required: false
        type: string
        default: ''
      cr_number:
        description: Change Request number — required for PROD
        required: false
        type: string
        default: ''

jobs:
  main-pipeline:
    permissions:
      statuses: write
      contents: write
    uses: daws-88s/workflows/.github/workflows/eks-main-pipeline.yaml@main
    with:
      project: 'roboshop'
      component: 'catalogue'
      deploy_to: ${{ inputs.deploy_to || 'dev' }}
      version: ${{ inputs.version || '' }}
      jira_key: ${{ inputs.jira_key || '' }}
      cr_number: ${{ inputs.cr_number || '' }}
      language: nodejs
    secrets: inherit
